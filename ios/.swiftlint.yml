# BAR-380: SwiftLint Configuration
# Enforces consistent code style across the ShipOS iOS codebase.

included:
  - ShipOS
  - ShipOSTests
  - ShipOSWidgets

excluded:
  - ShipOS/Generated
  - Pods

# Rules
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo
  - trailing_whitespace
  - opening_brace

# Custom Rule Configurations
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

type_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 1  # Allow single-letter vars (i, x, etc.)
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - to
    - x
    - y
    - i

nesting:
  type_level: 3
  function_level: 3

large_tuple:
  warning: 4
  error: 5

cyclomatic_complexity:
  warning: 15
  error: 25

reporter: "xcode"
