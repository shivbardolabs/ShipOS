# XcodeGen Project Specification
# Generate .xcodeproj: `xcodegen generate`
# Requires: brew install xcodegen

name: ShipOS
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Auth0:
    url: https://github.com/auth0/Auth0.swift
    from: "2.7.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  ShipOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShipOS
    resources:
      - path: ShipOS/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.bardolabs.shipos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ShipOS/App/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_PREVIEWS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        NSCameraUsageDescription: "ShipOS needs camera access to scan barcodes and capture package labels"
        NSFaceIDUsageDescription: "Use Face ID to unlock ShipOS quickly"
    entitlements:
      path: ShipOS/App/ShipOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.bardolabs.shipos
        aps-environment: development
    dependencies:
      - package: Auth0
      - package: KeychainAccess
      - target: ShipOSWidgets
        embed: true
    postBuildScripts:
      - name: "SwiftLint"
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false

  ShipOSWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShipOSWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.bardolabs.shipos.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ShipOSWidgets/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: ShipOSWidgets/ShipOSWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ai.bardolabs.shipos

  ShipOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ShipOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.bardolabs.shipos.tests
    dependencies:
      - target: ShipOS

  ShipOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ShipOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.bardolabs.shipos.uitests
    dependencies:
      - target: ShipOS

schemes:
  ShipOS:
    build:
      targets:
        ShipOS: all
        ShipOSWidgets: all
        ShipOSTests: [test]
        ShipOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        SHIPOS_API_URL: "https://app.getshipos.com"
    test:
      config: Debug
      targets:
        - ShipOSTests
        - ShipOSUITests
    profile:
      config: Release
    archive:
      config: Release
