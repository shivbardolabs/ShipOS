# BAR-379: CI/CD Pipeline for ShipOS iOS
# Triggers on PRs touching ios/ and on pushes to main/release branches.
# Runs lint, build, test, and optionally deploys to TestFlight.

name: iOS CI/CD

on:
  push:
    branches: [main, "release/**"]
    paths: ["ios/**", ".github/workflows/ios-ci.yml"]
  pull_request:
    paths: ["ios/**"]

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "15.4"
  SCHEME: "ShipOS"
  DESTINATION: "platform=iOS Simulator,OS=17.5,name=iPhone 15 Pro"

jobs:
  # ─── Lint ──────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --strict --reporter github-actions-logging

  # ─── Build & Test ──────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        working-directory: ios
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('ios/project.yml') }}
          restore-keys: spm-

      - name: Resolve Dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme ${{ env.SCHEME }} \
            -clonedSourcePackagesDirPath ../SPMCache

      - name: Build
        working-directory: ios
        run: |
          xcodebuild build-for-testing \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -clonedSourcePackagesDirPath ../SPMCache \
            -resultBundlePath ../build/Build.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        working-directory: ios
        run: |
          xcodebuild test-without-building \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -clonedSourcePackagesDirPath ../SPMCache \
            -resultBundlePath ../build/Test.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output ../build/test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/Test.xcresult

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: build/test-results.xml
          check_name: "iOS Unit Tests"

  # ─── Code Coverage ─────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: macos-14
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        working-directory: ios
        run: xcodegen generate

      - name: Run Tests with Coverage
        working-directory: ios
        run: |
          xcodebuild test \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -enableCodeCoverage YES \
            -resultBundlePath ../build/Coverage.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Extract Coverage
        run: |
          xcrun xccov view --report --json build/Coverage.xcresult > build/coverage.json
          python3 -c "
          import json
          with open('build/coverage.json') as f:
              data = json.load(f)
          targets = data.get('targets', [])
          for t in targets:
              if 'ShipOS' in t.get('name', '') and 'Tests' not in t.get('name', ''):
                  pct = t.get('lineCoverage', 0) * 100
                  print(f'Coverage: {pct:.1f}%')
                  break
          "

  # ─── TestFlight Deploy ─────────────────────────────
  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-14
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install Tools
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Generate Project
        working-directory: ios
        run: xcodegen generate

      - name: Setup Signing
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        working-directory: ios
        run: fastlane match appstore --readonly

      - name: Build & Upload
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        working-directory: ios
        run: fastlane beta

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ ShipOS iOS build uploaded to TestFlight\nVersion: ${{ github.sha }}\nBranch: main"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
